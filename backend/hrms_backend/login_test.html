<!DOCTYPE html>
<html>
<head>
    <title>Simple Employee Login</title>
</head>
<body>
    <h2>Employee Login</h2>
    
    <form id="loginForm" onsubmit="handleLogin(event)">
        <input type="text" id="username" value="employee1" placeholder="Username"><br>
        <input type="password" id="password" value="password123" placeholder="Password"><br>
        <button type="submit">Login</button>
    </form>
    
    <div id="result"></div>
    
    <script>
        async function handleLogin(event) {
            event.preventDefault();
            
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = 'Logging in...';
            
            try {
                const response = await fetch('http://localhost:8000/api/employee-login/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        username: document.getElementById('username').value,
                        password: document.getElementById('password').value
                    })
                });
                
                const data = await response.json();
                resultDiv.innerHTML = '<pre>' + JSON.stringify(data, null, 2) + '</pre>';
                
                if (response.ok) {
                    resultDiv.innerHTML += '<p style="color:green">✅ Login successful!</p>';
                    setTimeout(() => {
                        window.location.href = 'http://localhost:8000/employee/holidays-view/';
                    }, 1000);
                }
            } catch (error) {
                resultDiv.innerHTML = '<p style="color:red">Error: ' + error.message + '</p>';
            }
        }
    </script>
</body>
